<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paises</title>

    <style>

        .paises {

             
           
             display: flex;
                gap: 10px;
                justify-content: center;
        }

        .pais{
            border: solid 1px;
            width: 200px;
            height: 100px;
        }

        .vermelho{

            background-color: red;
            
        }

        .branco{

            background-color: white;
            
        }

        .azul{
            background-color: blue;
            
        }

        .preto{
            background-color: black;
            
        }

        .amarelo{

            background-color: yellow;
            
        }
        .pais div{
            width: 100%;
            height: 33%;
        }

        #italia div{
            width: 33.33%;
            height: 100%;

        }

        #italia .vermelho{

            align-content:flex-start;
        }



    </style>
</head>

<body>


    <div class="paises">
        
        <div class="pais">

            <div class="vermelho"></div>
            <div class="branco"></div>
            <div class="azul"></div>


        </div>


        <div class="pais">

            <div class="preto"> </div>
            <div class="vermelho"></div>
            <div class="amarelo"></div>

        </div>


        <div class="pais" id="italia">

            <div class="verde"></div>
            <div class="branco"> </div>
            <div class="vermelho"></div>


        </div>




</div>



</body>
</html>
