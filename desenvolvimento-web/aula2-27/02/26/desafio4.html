<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

 body{
        margin: 0%;
        padding: 0%;
         width: 100%;
        height: 100%;
        background-color: rgb(95, 236, 255);
    }

     
.semaforo{
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .caixa{
        width: 100px;
        height: 100px;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .vermelho{
        background-color: red;
        width: 80%;
        height: 80%;
        border-radius: 50%;
        border : solid 5px;
        border-color: gray;
    }

    .amarelo{
        background-color: yellow;
        width: 80%;
        height: 80%;
        border-radius: 50%;
        border: solid 5px;
        border-color:gray
    }

    .verde{
        background-color: green;
        width: 80%;
        height: 80%;
        border-radius: 50%;
        border: solid 5px;
        border-color: gray;
    }
    #poste{
        width: 20px;
        height: 150px;
        background-color: gray;
    }

    .rua{
        width: 100%;
        height: 130px;
        padding: 0%;
        margin:0%;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .faixa{
        width: 150px;
        height: 20px;
        background-color: yellow;
        margin: 50px;
        justify-content: center;
        align-items: center;
    }


</style>
<body>
   
<div class = semaforo>
    <div class = caixa>
             <div class = vermelho></div>
  </div>

     <div class = caixa>
            <div class = amarelo></div>
    </div>

    <div class = caixa>
            <div class = verde></div>
     </div>
     <div id = poste></div>
</div>

<div class = rua>
    <div class = faixa></div>
    <div class = faixa></div>
    <div class = faixa></div>
    <div class = faixa></div>
</div>
</div>
</body>
</html>
